<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polícia Penal RS - Edital Verticalizado</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #f1f5f9;
            --bg-card: #ffffff;
            --text-main: #0f172a;
            --accent: #4f46e5;
            --border: #e2e8f0;
            --secondary-text: #64748b;
        }

        .dark-mode {
            --bg-primary: #020617;
            --bg-card: #0f172a;
            --text-main: #f8fafc;
            --accent: #818cf8;
            --border: #1e293b;
            --secondary-text: #94a3b8;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-main);
            transition: background-color 0.3s ease, color 0.3s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .card {
            background-color: var(--bg-card);
            border-radius: 16px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--border);
            transition: transform 0.2s ease;
        }

        .checkbox-custom {
            width: 22px;
            height: 22px;
            border-radius: 6px;
            cursor: pointer;
            accent-color: var(--accent);
            flex-shrink: 0;
        }

        .progress-container {
            height: 8px;
            background-color: #e2e8f0;
            border-radius: 999px;
            overflow: hidden;
        }

        .dark-mode .progress-container {
            background-color: #334155;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #4f46e5, #818cf8);
            width: 0%;
            transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .subject-header {
            cursor: pointer;
            user-select: none;
        }

        .topic-item {
            transition: background-color 0.2s;
            border-bottom: 1px solid var(--border);
        }

        .topic-item:last-child {
            border-bottom: none;
        }

        .topic-item:hover {
            background-color: rgba(79, 70, 229, 0.05);
        }

        .sticky-progress {
            position: sticky;
            top: 0;
            z-index: 100;
            background-color: var(--bg-primary);
            padding: 1.5rem 0;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(12px);
        }
    </style>
</head>
<body class="pb-12">

    <div class="max-w-4xl mx-auto px-4">
        <!-- Header -->
        <header class="pt-8 mb-4 flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div>
                <h1 class="text-3xl font-extrabold tracking-tight text-indigo-600 dark:text-indigo-400">Polícia Penal RS</h1>
                <p class="text-slate-500 dark:text-slate-400 font-medium">2026</p>
            </div>
            <button id="themeToggle" class="self-start md:self-center p-2.5 rounded-xl border border-gray-300 dark:border-gray-600 hover:bg-gray-100 dark:hover:bg-gray-800 transition-all shadow-sm">
                <svg id="sunIcon" class="w-6 h-6 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M12 5a7 7 0 100 14 7 7 0 000-14z"></path></svg>
                <svg id="moonIcon" class="w-6 h-6 text-slate-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
            </button>
        </header>

        <!-- Global Progress Sticky -->
        <div class="sticky-progress">
            <div class="flex items-center justify-between mb-3">
                <span class="text-xs font-bold uppercase tracking-[0.2em] text-slate-500">Progresso Geral</span>
                <span id="overallPercentage" class="text-3xl font-black text-indigo-600 dark:text-indigo-400">0%</span>
            </div>
            <div class="progress-container w-full shadow-inner">
                <div id="overallProgressBar" class="progress-bar"></div>
            </div>
        </div>

        <!-- Subjects Container -->
        <div id="mainContainer" class="space-y-6">
            <!-- JS Inject -->
        </div>

        <footer class="mt-12 py-8 text-center border-t border-gray-200 dark:border-gray-800">
            <p class="text-sm text-slate-400 dark:text-slate-500 italic">Os dados são armazenados localmente e salvos automaticamente.</p>
        </footer>
    </div>

                    '4. CF/88: Advocacia e Defensoria Pública (Artigos: 133 e 134)',
                    '4. CF/88: Defesa do Estado e Segurança Pública (Artigo 144)',
                    '5. Lei Federal nº 7.960/1989 (Prisão Temporária)',
                    '6. Lei Federal nº 7.210/1984 (Lei de Execução Penal)',
                    '7. Lei Federal nº 7.853/1989 (Apoio às pessoas portadoras de deficiência)',
                    '8. Lei Federal nº 8.069/1990 (Estatuto da Criança e do Adolescente)',
                    '9. Lei Federal nº 8.072/1990 (Crimes Hediondos)',
                    '10. Lei Federal nº 8.429/1992 (Improbidade Administrativa)',
                    '11. Lei nº 14.133/2021 (Licitações e Contratos Administrativos)',
                    '12. Lei Federal nº 8.930/1994 (Redação art. 1º da Lei 8.072)',
                    '13. Lei Federal nº 9.455/1997 (Crimes de Tortura)',
                    '14. Lei Est. 10.098/94: Disposições Preliminares (Artigos 1°; 2°; 3°; 4°; 5°; 6°; 7° e 8°)',
                    '14. Lei Est. 10.098/94: Provimento e Recrutamento (Artigos 10 e 11)',
                    '14. Lei Est. 10.098/94: Concurso Público (Artigos 12; 13; 14 e 15)',
                    '14. Lei Est. 10.098/94: Nomeação, Lotação e Posse (Artigos 16; 17; 18; 19; 20 e 21)',

                    '14. Lei Est. 10.098/94: Estágio Probatório e Estabilidade (Artigos 28; 29; 30 e 31)',
                    '14. Lei Est. 10.098/94: Regime de Trabalho e Promoção (Artigos 32; 33; 34; 35; 36; 37 e 38)',

                    '14. Lei Est. 10.098/94: Recondução, Vacância, Remoção (Artigos 54; 55; 56; 58)',

                    '22. Declaração Universal Dos Direitos Humanos (1948)',
                    '23. Código Penal: Aplicação da Lei, Imputabilidade, Concurso de Pessoas',
                    '23. Código Penal: Penas, Medidas de Segurança, Ação Penal, Extinção Punibilidade',
                    '23. Código Penal: Crimes Pessoa, Patrimônio, Dignidade Sexual, Paz e Fé Pública',
                    '23. Código Penal: Crimes Contra a Administração Pública',
                    '24. Código de Processo Penal: Prisão, Liberdade Provisória e LEP (Lei 7.210/84)',
                    '25. Decreto n° 678/1992 (Pacto de São José da Costa Rica)',
                    '26. Decreto nº 46.534/2009 (Regimento Disciplinar Penitenciário RS)',

                    '28. Const. RS: Administração Pública e Servidores Civis (Artigos: 19 ao 45)',
                    '28. Const. RS: Poder Legislativo e Atribuições (Artigos: 49 e 52)',
                    '28. Const. RS: Poder Executivo e Governador (Artigos: 78 e 82)',
                    '28. Const. RS: Secretários de Estado e Poder Judiciário (Artigos: 85 ao 94)',
                    '28. Const. RS: Juízes, Ministério Público e Advocacia (Artigos: 98 ao 115)',
                    '28. Const. RS: Defensoria e Segurança Pública (Artigos: 120 ao 127)',
                    '28. Const. RS: Brigada Militar, Polícia Civil e IGP (Artigos: 129 ao 136)',
                    '28. Const. RS: Política Penitenciária (Artigos: 137; 138 e 139)',
                    '29. Constituição Estadual do Rio Grande do Sul (Geral)',

            {
                id: 'rl',
                title: 'Raciocínio Lógico',
                topics: [
                    '1. Estrutura lógica de relações arbitrárias e Diagramas Lógicos',
                    '2. Proposições: Conceito, valores lógicos, simples e compostas',
                    '2. Operações lógicas: Negação, conjunção, disjunção, disjunção exclusiva, condicional, bicondicional',
                    '3. Construção de tabelas-verdade',
                    '3. Tautologias, contradições e contingências',
                    '3. Implicação lógica, equivalência lógica, Leis De Morgan',
                    '3. Argumentação e dedução lógica',
                    '4. Sentenças abertas e operações lógicas',
                    '4. Quantificador universal e existencial, negação de proposições quantificadas',
                    '5. Argumentos Lógicos Dedutivos e Argumentos Categóricos'
                ]
            }
        ];

        const container = document.getElementById('mainContainer');
        const themeToggle = document.getElementById('themeToggle');
        const sunIcon = document.getElementById('sunIcon');
        const moonIcon = document.getElementById('moonIcon');

        let progressData = JSON.parse(localStorage.getItem('v4_edital_progress')) || {};
        let isDarkMode = localStorage.getItem('v4_edital_darkmode') === 'true';

        function updateTheme() {
            if (isDarkMode) {
                document.body.classList.add('dark-mode');
                sunIcon.classList.remove('hidden');
                moonIcon.classList.add('hidden');
            } else {
                document.body.classList.remove('dark-mode');
                sunIcon.classList.add('hidden');
                moonIcon.classList.remove('hidden');
            }
        }

        themeToggle.addEventListener('click', () => {
            isDarkMode = !isDarkMode;
            localStorage.setItem('v4_edital_darkmode', isDarkMode);
            updateTheme();
        });

        function updateProgress() {
            let totalChecked = 0;
            let totalTopics = 0;

            syllabusData.forEach(subject => {
                const subjectCheckboxes = document.querySelectorAll(`input[data-subject="${subject.id}"]`);
                const checkedInSubject = Array.from(subjectCheckboxes).filter(cb => cb.checked).length;
                
                totalChecked += checkedInSubject;
                totalTopics += subjectCheckboxes.length;

                const percentage = subjectCheckboxes.length > 0 ? Math.round((checkedInSubject / subjectCheckboxes.length) * 100) : 0;
                
                const bar = document.getElementById(`bar-${subject.id}`);
                const text = document.getElementById(`text-${subject.id}`);
                if(bar) bar.style.width = `${percentage}%`;
                if(text) text.innerText = `${percentage}%`;
            });

            const overall = totalTopics > 0 ? Math.round((totalChecked / totalTopics) * 100) : 0;
            document.getElementById('overallProgressBar').style.width = `${overall}%`;
            document.getElementById('overallPercentage').innerText = `${overall}%`;
        }

        function toggleTopic(topicId, subjectId) {
            const checkbox = document.querySelector(`input[data-topic="${topicId}"]`);
            progressData[topicId] = checkbox.checked;
            localStorage.setItem('v4_edital_progress', JSON.stringify(progressData));
            updateProgress();
        }

        function toggleAccordion(subjectId) {
            const content = document.getElementById(`content-${subjectId}`);
            const icon = document.getElementById(`icon-${subjectId}`);
            content.classList.toggle('hidden');
            icon.classList.toggle('rotate-180');
        }

        function render() {
            container.innerHTML = '';
            syllabusData.forEach(subject => {
                const subjectCard = document.createElement('div');
                subjectCard.className = 'card overflow-hidden';
                
                let topicsHtml = '';
                subject.topics.forEach((topic, index) => {
                    const topicId = `${subject.id}-${index}`;
                    const checkedAttr = progressData[topicId] ? 'checked' : '';
                    topicsHtml += `
                        <label class="topic-item flex items-start gap-4 p-4 cursor-pointer">
                            <input type="checkbox" 
                                   class="checkbox-custom mt-0.5" 
                                   data-subject="${subject.id}" 
                                   data-topic="${topicId}" 
                                   ${checkedAttr}
                                   onchange="toggleTopic('${topicId}', '${subject.id}')">
                            <span class="text-sm md:text-base font-medium leading-relaxed">${topic}</span>
                        </label>
                    `;
                });

                subjectCard.innerHTML = `
                    <div class="subject-header p-5 flex items-center justify-between gap-4" onclick="toggleAccordion('${subject.id}')">
                        <div class="flex items-center gap-4">
                            <div class="w-1.5 h-10 bg-indigo-500 rounded-full"></div>
                            <h2 class="text-lg md:text-xl font-bold tracking-tight">${subject.title}</h2>
                        </div>
                        <div class="flex items-center gap-6">
                            <div class="hidden sm:block text-right">
                                <div class="progress-container w-24 mb-1 shadow-inner">
                                    <div id="bar-${subject.id}" class="progress-bar"></div>
                                </div>
                                <span id="text-${subject.id}" class="text-[10px] font-black uppercase tracking-widest opacity-60 text-indigo-600 dark:text-indigo-400">0%</span>
                            </div>
                            <svg id="icon-${subject.id}" class="w-6 h-6 transition-transform duration-300 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                            </svg>
                        </div>
                    </div>
                    <div id="content-${subject.id}" class="hidden border-t border-gray-100 dark:border-gray-800">
                        <div class="bg-slate-50/40 dark:bg-slate-900/20">
                            ${topicsHtml}
                        </div>
                    </div>
                `;
                container.appendChild(subjectCard);
            });
            updateTheme();
            updateProgress();
        }

        render();
    </script>
</body>
</html>
