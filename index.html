<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polícia Penal RS - Edital Verticalizado</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #f1f5f9;
            --bg-card: #ffffff;
            --text-main: #0f172a;
            --accent: #4f46e5;
            --border: #e2e8f0;
            --secondary-text: #64748b;
        }

        .dark-mode {
            --bg-primary: #020617;
            --bg-card: #0f172a;
            --text-main: #f8fafc;
            --accent: #818cf8;
            --border: #1e293b;
            --secondary-text: #94a3b8;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-main);
            transition: background-color 0.3s ease, color 0.3s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .card {
            background-color: var(--bg-card);
            border-radius: 16px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--border);
            transition: transform 0.2s ease;
        }

        .checkbox-custom {
            width: 22px;
            height: 22px;
            border-radius: 6px;
            cursor: pointer;
            accent-color: var(--accent);
            flex-shrink: 0;
        }

        .progress-container {
            height: 8px;
            background-color: #e2e8f0;
            border-radius: 999px;
            overflow: hidden;
        }

        .dark-mode .progress-container {
            background-color: #334155;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #4f46e5, #818cf8);
            width: 0%;
            transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .subject-header {
            cursor: pointer;
            user-select: none;
        }

        .topic-item {
            transition: background-color 0.2s;
            border-bottom: 1px solid var(--border);
        }

        .topic-item:last-child {
            border-bottom: none;
        }

        .topic-item:hover {
            background-color: rgba(79, 70, 229, 0.05);
        }

        .sticky-progress {
            position: sticky;
            top: 0;
            z-index: 100;
            background-color: var(--bg-primary);
            padding: 1.5rem 0;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(12px);
        }
    </style>
</head>
<body class="pb-12">

    <div class="max-w-4xl mx-auto px-4">
        <!-- Header -->
        <header class="pt-8 mb-4 flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div>
                <h1 class="text-3xl font-extrabold tracking-tight text-indigo-600 dark:text-indigo-400">Polícia Penal RS</h1>
                <p class="text-slate-500 dark:text-slate-400 font-medium">Edital Verticalizado</p>
            </div>
            <button id="themeToggle" class="self-start md:self-center p-2.5 rounded-xl border border-gray-300 dark:border-gray-600 hover:bg-gray-100 dark:hover:bg-gray-800 transition-all shadow-sm">
                <svg id="sunIcon" class="w-6 h-6 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M12 5a7 7 0 100 14 7 7 0 000-14z"></path></svg>
                <svg id="moonIcon" class="w-6 h-6 text-slate-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
            </button>
        </header>

        <!-- Global Progress Sticky -->
        <div class="sticky-progress">
            <div class="flex items-center justify-between mb-3">
                <span class="text-xs font-bold uppercase tracking-[0.2em] text-slate-500">Progresso Geral</span>
                <span id="overallPercentage" class="text-3xl font-black text-indigo-600 dark:text-indigo-400">0%</span>
            </div>
            <div class="progress-container w-full shadow-inner">
                <div id="overallProgressBar" class="progress-bar"></div>
            </div>
        </div>

        <!-- Subjects Container -->
        <div id="mainContainer" class="space-y-6">
            <!-- JS Inject -->
        </div>

        <footer class="mt-12 py-8 text-center border-t border-gray-200 dark:border-gray-800">
            <p class="text-sm text-slate-400 dark:text-slate-500 italic">Os dados são armazenados localmente e salvos automaticamente.</p>
        </footer>
    </div>

    <script>
        const syllabusData = [
            {
                id: 'pt',
                title: 'Língua Portuguesa',
                topics: [
                    '1. Leitura e compreensão de textos',
                    '1.1 Assunto',
                    '1.2 Estruturação do texto',
                    '1.3 Ideias principais e secundárias',
                    '1.4 Relação entre as ideias',
                    '1.5 Efeitos de sentido',
                    '1.6 Figuras de linguagem',
                    '1.7 Recursos de argumentação',
                    '1.8 Informações implícitas: pressupostos e subentendidos',
                    '1.9 Coesão e coerência textuais',
                    '2. Léxico',
                    '2.1 Significação de palavras e expressões no texto',
                    '2.2 Substituição de palavras e de expressões no texto',
                    '2.3 Estrutura e formação de palavras',
                    '3. Aspectos linguísticos',
                    '3.1 Relações morfossintáticas',
                    '3.2 Ortografia: emprego de letras e acentuação gráfica (Acordo Ortográfico Dec. 7.875/12)',
                    '3.3 Relações entre fonemas e grafias',
                    '3.4 Flexões e emprego de classes gramaticais',
                    '3.5 Vozes verbais e sua conversão',
                    '3.6 Concordância nominal e verbal',
                    '3.7 Regência nominal e verbal (incluindo crase)',
                    '3.8 Coordenação e subordinação (conjunções e pronomes relativos)',
                    '3.9 Pontuação'
                ]
            },
            {
                id: 'info',
                title: 'Informática',
                topics: [
                    '1. Windows 10: (1) Área de Trabalho e Menu Iniciar (Exibir, Classificar, Atalhos, etc)',
                    '1. Windows 10: (2) Barra de Tarefas, Menu Iniciar e Gerenciador de Tarefas',
                    '1. Windows 10: (3) Janelas, Painel de Controle e Lixeira',
                    '1. Windows 10: (4) Bibliotecas, Arquivos, Pastas, Ícones e Atalhos (Operações)',
                    '1. Windows 10: (5) Nomes válidos para arquivos e pastas',
                    '2. Word 2016: (1) Ambiente, Componentes e Personalização',
                    '2. Word 2016: (2) Documentos (Criar, Salvar, Formatar)',
                    '2. Word 2016: (3) Barra de Ferramentas e Faixa de Opções (Guias Início a Exibição)',
                    '2. Word 2016: (4) Sistema de Ajuda',
                    '3. Excel 2016: (1) Ambiente, Componentes e Janela',
                    '3. Excel 2016: (2) Elementos: Célula, Planilha e Pasta',
                    '3. Excel 2016: (3) Planilhas e Pastas (Fórmulas e Funções)',
                    '3. Excel 2016: (4) Barra de Ferramentas e Formatação de Células',
                    '3. Excel 2016: (5) Significado e resultado de fórmulas',
                    '3. Excel 2016: (6) Sistema de Ajuda',
                    '4. Google Chrome: (1) Ambiente e Componentes da Janela',
                    '4. Google Chrome: (2) Todas as Funcionalidades',
                    '5. Mozilla Firefox: (1) Ambiente e Componentes da Janela',
                    '5. Mozilla Firefox: (2) Todas as Funcionalidades',
                    '6. Internet Explorer 11: (1) Ambiente e Janela Principal',
                    '6. Internet Explorer 11: (2-4) Barras de Ferramentas, Favoritos e Menus',
                    '6. Internet Explorer 11: (5) Teclas de atalho',
                    '7. Outlook Express: Contas, Mensagens e Anexos',
                    '7. Outlook Express: Importação/Exportação e Atalhos',
                    '8. Microsoft Outlook 2016: Contas, Mensagens e Organização',
                    '9. Gmail: Menus, Caixas, Filtros e Configurações'
                ]
            },
            {
                id: 'leg',
                title: 'Legislação Aplicada / Direito',
                topics: [
                    '1. Lei Federal nº 11.340/2006 (Lei Maria da Penha)',
                    '2. Lei Federal nº 12.288/2010 (Estatuto Nacional da Igualdade Racial)',
                    '3. Lei Estadual nº 13.694/2011 (Estatuto Estadual da Igualdade Racial)',
                    '4. CF/88: Princípios Fundamentais (Art. 1º ao 4º)',
                    '4. CF/88: Direitos e Garantias Fundamentais (Art. 5º ao 17)',
                    '4. CF/88: Organização do Estado (Art. 21 ao 28)',
                    '4. CF/88: Administração Pública (Art. 37 ao 41)',
                    '4. CF/88: Poder Judiciário (Art. 92 ao 100)',
                    '4. CF/88: Tribunais e Juízes dos Estados (Art. 125 e 126)',
                    '4. CF/88: Ministério Público (Art. 127 ao 129)',
                    '4. CF/88: Advocacia e Defensoria Pública (Art. 131 ao 134)',
                    '4. CF/88: Segurança Pública (Art. 144)',
                    '5. Lei Federal nº 7.960/1989 (Prisão Temporária)',
                    '6. Lei Federal nº 7.210/1984 (Lei de Execução Penal)',
                    '7. Lei Federal nº 7.853/1989 (Apoio às Pessoas com Deficiência)',
                    '8. Lei Federal nº 8.069/1990 (ECA)',
                    '9. Lei Federal nº 8.072/1990 (Crimes Hediondos)',
                    '10. Lei Federal nº 8.429/1992 (Improbidade Administrativa)',
                    '11. Lei nº 14.133/2021 (Licitações e Contratos)',
                    '12. Lei Federal nº 8.930/1994 (Redação Crimes Hediondos)',
                    '13. Lei Federal nº 9.455/1997 (Crimes de Tortura)',
                    '14. Lei Est. 10.098/94: Disposições Preliminares (Art. 1º ao 8º)',
                    '14. Lei Est. 10.098/94: Provimento, Recrutamento e Concurso (Art. 10 ao 15)',
                    '14. Lei Est. 10.098/94: Nomeação, Lotação e Posse (Art. 16 ao 21)',
                    '14. Lei Est. 10.098/94: Exercício, Estágio e Estabilidade (Art. 22 ao 31)',
                    '14. Lei Est. 10.098/94: Regime de Trabalho e Promoção (Art. 32 ao 38)',
                    '14. Lei Est. 10.098/94: Formas de Provimento/Vacância (Art. 39 ao 61)',
                    '14. Lei Est. 10.098/94: Tempo de Serviço e Férias (Art. 62 ao 72)',
                    '14. Lei Est. 10.098/94: Vencimento, Remuneração e Vantagens (Art. 78 ao 88)',
                    '14. Lei Est. 10.098/94: Indenizações, Diárias e Avanços (Art. 89 ao 99)',
                    '14. Lei Est. 10.098/94: Gratificações e Adicionais (Art. 100 ao 116)',
                    '14. Lei Est. 10.098/94: Direito de Petição (Art. 167 ao 176)',
                    '14. Lei Est. 10.098/94: Deveres e Proibições (Art. 177 e 178)',
                    '14. Lei Est. 10.098/94: Acumulações e Responsabilidades (Art. 179 ao 186)',
                    '14. Lei Est. 10.098/94: Penalidades e PAD (Art. 187 ao 200)',
                    '14. Lei Est. 10.098/94: Sindicância e Afastamento (Art. 201 ao 204)',
                    '14. Lei Est. 10.098/94: PAD em Espécie e Inquérito (Art. 205 ao 225)',
                    '14. Lei Est. 10.098/94: Disposições Gerais (Art. 266 ao 269)',
                    '15. Lei Federal nº 10.216/2001 (Proteção em Saúde Mental)',
                    '16. Lei Federal nº 10.741/2003 (Estatuto do Idoso)',
                    '17. Lei Federal nº 10.826/2003 (Estatuto do Desarmamento)',
                    '18. Lei Federal nº 11.343/2006 (Lei de Drogas)',
                    '19. Lei Federal nº 11.464/2007 (Alteração Crimes Hediondos)',
                    '20. Lei Federal nº 12.403/2011 (Prisão Processual e Fiança)',
                    '21. Lei Est. 13.259/2009 (Quadro Especial SUSEPE)',
                    '22. Declaração Universal Dos Direitos Humanos (1948)',
                    '23. Código Penal: Aplicação, Imputabilidade e Penas',
                    '23. Código Penal: Crimes Pessoa, Patrimônio e Dignidade Sexual',
                    '23. Código Penal: Crimes Paz, Fé e Administração Pública',
                    '24. Código de Processo Penal: Prisão e Liberdade Provisória',
                    '25. Decreto n° 678/1992 (Pacto de São José da Costa Rica)',
                    '26. Decreto nº 46.534/2009 (Regimento Disciplinar Penitenciário RS)',
                    '27. Resolução nº 14/1994 (Regras Mínimas Tratamento Preso)',
                    '28. Const. RS: Princípios e Organização (Art. 1º ao 7º)',
                    '28. Const. RS: Administração e Servidores (Art. 19 ao 45)',
                    '28. Const. RS: Poderes Legislativo e Executivo (Art. 49 ao 82)',
                    '28. Const. RS: Poder Judiciário e Funções Justiça (Art. 91 ao 122)',
                    '28. Const. RS: Segurança Pública e Órgãos (Art. 124 ao 136)',
                    '28. Const. RS: Política Penitenciária (Art. 137 ao 139)',
                    '29. Constituição Estadual do Rio Grande do Sul (Texto Integral)',
                    '30. Decreto Est. nº 48.598/2011 (Gênero, Raça e Etnia)'
                ]
            },
            {
                id: 'rl',
                title: 'Raciocínio Lógico',
                topics: [
                    '1. Estrutura lógica de relações arbitrárias e Diagramas Lógicos',
                    '2. Proposições e conectivos (Simples, Compostas e Valores Lógicos)',
                    '2. Operações lógicas: Negação, Conjunção, Disjunção e Condicionais',
                    '3. Construção de tabelas-verdade',
                    '3. Tautologias, contradições e contingências',
                    '3. Implicação e Equivalência Lógica (Leis De Morgan)',
                    '3. Argumentação e dedução lógica',
                    '4. Sentenças abertas e operações lógicas',
                    '4. Quantificadores (Universal e Existencial) e Negação',
                    '5. Argumentos Lógicos Dedutivos e Argumentos Categóricos'
                ]
            }
        ];

        const container = document.getElementById('mainContainer');
        const themeToggle = document.getElementById('themeToggle');
        const sunIcon = document.getElementById('sunIcon');
        const moonIcon = document.getElementById('moonIcon');

        let progressData = JSON.parse(localStorage.getItem('v3_edital_progress')) || {};
        let isDarkMode = localStorage.getItem('v3_edital_darkmode') === 'true';

        function updateTheme() {
            if (isDarkMode) {
                document.body.classList.add('dark-mode');
                sunIcon.classList.remove('hidden');
                moonIcon.classList.add('hidden');
            } else {
                document.body.classList.remove('dark-mode');
                sunIcon.classList.add('hidden');
                moonIcon.classList.remove('hidden');
            }
        }

        themeToggle.addEventListener('click', () => {
            isDarkMode = !isDarkMode;
            localStorage.setItem('v3_edital_darkmode', isDarkMode);
            updateTheme();
        });

        function updateProgress() {
            let totalChecked = 0;
            let totalTopics = 0;

            syllabusData.forEach(subject => {
                const subjectCheckboxes = document.querySelectorAll(`input[data-subject="${subject.id}"]`);
                const checkedInSubject = Array.from(subjectCheckboxes).filter(cb => cb.checked).length;
                
                totalChecked += checkedInSubject;
                totalTopics += subjectCheckboxes.length;

                const percentage = subjectCheckboxes.length > 0 ? Math.round((checkedInSubject / subjectCheckboxes.length) * 100) : 0;
                
                const bar = document.getElementById(`bar-${subject.id}`);
                const text = document.getElementById(`text-${subject.id}`);
                if(bar) bar.style.width = `${percentage}%`;
                if(text) text.innerText = `${percentage}%`;
            });

            const overall = totalTopics > 0 ? Math.round((totalChecked / totalTopics) * 100) : 0;
            document.getElementById('overallProgressBar').style.width = `${overall}%`;
            document.getElementById('overallPercentage').innerText = `${overall}%`;
        }

        function toggleTopic(topicId, subjectId) {
            const checkbox = document.querySelector(`input[data-topic="${topicId}"]`);
            progressData[topicId] = checkbox.checked;
            localStorage.setItem('v3_edital_progress', JSON.stringify(progressData));
            updateProgress();
        }

        function toggleAccordion(subjectId) {
            const content = document.getElementById(`content-${subjectId}`);
            const icon = document.getElementById(`icon-${subjectId}`);
            content.classList.toggle('hidden');
            icon.classList.toggle('rotate-180');
        }

        function render() {
            container.innerHTML = '';
            syllabusData.forEach(subject => {
                const subjectCard = document.createElement('div');
                subjectCard.className = 'card overflow-hidden';
                
                let topicsHtml = '';
                subject.topics.forEach((topic, index) => {
                    const topicId = `${subject.id}-${index}`;
                    const checkedAttr = progressData[topicId] ? 'checked' : '';
                    topicsHtml += `
                        <label class="topic-item flex items-start gap-4 p-4 cursor-pointer">
                            <input type="checkbox" 
                                   class="checkbox-custom mt-0.5" 
                                   data-subject="${subject.id}" 
                                   data-topic="${topicId}" 
                                   ${checkedAttr}
                                   onchange="toggleTopic('${topicId}', '${subject.id}')">
                            <span class="text-sm md:text-base font-medium leading-relaxed">${topic}</span>
                        </label>
                    `;
                });

                subjectCard.innerHTML = `
                    <div class="subject-header p-5 flex items-center justify-between gap-4" onclick="toggleAccordion('${subject.id}')">
                        <div class="flex items-center gap-4">
                            <div class="w-1.5 h-10 bg-indigo-500 rounded-full"></div>
                            <h2 class="text-lg md:text-xl font-bold tracking-tight">${subject.title}</h2>
                        </div>
                        <div class="flex items-center gap-6">
                            <div class="hidden sm:block text-right">
                                <div class="progress-container w-24 mb-1 shadow-inner">
                                    <div id="bar-${subject.id}" class="progress-bar"></div>
                                </div>
                                <span id="text-${subject.id}" class="text-[10px] font-black uppercase tracking-widest opacity-60 text-indigo-600 dark:text-indigo-400">0%</span>
                            </div>
                            <svg id="icon-${subject.id}" class="w-6 h-6 transition-transform duration-300 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                            </svg>
                        </div>
                    </div>
                    <div id="content-${subject.id}" class="hidden border-t border-gray-100 dark:border-gray-800">
                        <div class="bg-slate-50/40 dark:bg-slate-900/20">
                            ${topicsHtml}
                        </div>
                    </div>
                `;
                container.appendChild(subjectCard);
            });
            updateTheme();
            updateProgress();
        }

        render();
    </script>
</body>
</html>
